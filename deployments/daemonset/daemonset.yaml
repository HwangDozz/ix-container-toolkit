---
# ix-toolkit DaemonSet
# Runs on every node that has Iluvatar GPUs to:
#   1. Install ix-container-runtime and ix-container-hook to the host.
#   2. Patch the containerd configuration to register the ix runtime class.
#   3. (Optionally) restart containerd.
#
# Prerequisites:
#   - The container image ix-toolkit/installer must be built and pushed.
#   - The official Iluvatar Device Plugin DaemonSet must already be running.
#   - Nodes with Iluvatar GPUs should carry the label iluvatar.ai/gpu=present
#     (or remove the nodeSelector below to run on all nodes).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ix-toolkit
  namespace: kube-system
  labels:
    app: ix-toolkit
spec:
  selector:
    matchLabels:
      app: ix-toolkit
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ix-toolkit
    spec:
      serviceAccountName: ix-toolkit
      # Only run on nodes that have Iluvatar GPUs.
      nodeSelector:
        iluvatar.ai/gpu: "present"
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      hostPID: true

      # ------------------------------------------------------------------ #
      # Init container: install binaries + patch containerd, then exit.     #
      # ------------------------------------------------------------------ #
      initContainers:
        - name: ix-installer
          image: ix-toolkit/installer:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            # Injected by the Downward API — used by ix-installer to label this node.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Where to write binaries on the host (relative to /host).
            - name: HOST_BIN_DIR
              value: /usr/local/bin
            # Where to write the ix-toolkit config on the host.
            - name: HOST_CONFIG_DIR
              value: /etc/ix-toolkit
            # Path where the host rootfs is bind-mounted into the container.
            - name: HOST_MOUNT
              value: /host
            # Set to "true" to restart containerd after patching its config.
            - name: RESTART_CONTAINERD
              value: "true"
            # Iluvatar driver library paths on the host (colon-separated).
            - name: IX_DRIVER_LIB_PATHS
              value: /usr/local/corex/lib64:/usr/local/corex/lib
            - name: IX_DRIVER_BIN_PATHS
              value: /usr/local/corex/bin
            - name: IX_LOG_LEVEL
              value: info
          volumeMounts:
            - name: host-root
              mountPath: /host
            # Expose the host containerd socket so systemctl can be called.
            - name: host-run
              mountPath: /host/run

      # ------------------------------------------------------------------ #
      # Main container: keep-alive so the DaemonSet stays Running.         #
      # Without this Kubernetes would keep restarting the init container.  #
      # ------------------------------------------------------------------ #
      containers:
        - name: ix-toolkit-pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 10m
              memory: 10Mi

      volumes:
        - name: host-root
          hostPath:
            path: /
        - name: host-run
          hostPath:
            path: /run
