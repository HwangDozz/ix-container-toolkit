---
# Legacy reference manifest.
# Current deployment flow should render DaemonSet from a profile:
#   go run ./cmd/accelerator-profile-render daemonset --profile profiles/iluvatar-bi-v150.yaml --image <image>
# or:
#   make render-daemonset PROFILE=profiles/iluvatar-bi-v150.yaml IMAGE=<image>
#
# Keep this file only as a readable Iluvatar example; do not treat it as the
# source of truth for deployment.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: accelerator-toolkit
  namespace: kube-system
  labels:
    app: accelerator-toolkit
spec:
  selector:
    matchLabels:
      app: accelerator-toolkit
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: accelerator-toolkit
    spec:
      serviceAccountName: accelerator-toolkit
      # Only run on nodes that have Iluvatar GPUs.
      nodeSelector:
        iluvatar.ai/gpu: "present"
      tolerations:
        - key: iluvatar.ai/gpu
          operator: Exists
          effect: NoSchedule
      hostPID: true

      # ------------------------------------------------------------------ #
      # Init container: install binaries + patch containerd, then exit.     #
      # ------------------------------------------------------------------ #
      initContainers:
        - name: accelerator-installer
          image: accelerator-toolkit/installer:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          env:
            # Injected by the Downward API — used by accelerator-installer to label this node.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Where to write binaries on the host (relative to /host).
            - name: HOST_BIN_DIR
              value: /usr/local/bin
            # Where to write the accelerator-toolkit config on the host.
            - name: HOST_CONFIG_DIR
              value: /etc/accelerator-toolkit
            # Path where the host rootfs is bind-mounted into the container.
            - name: HOST_MOUNT
              value: /host
            - name: ACCELERATOR_PROFILE_FILE
              value: /profiles/iluvatar-bi-v150.yaml
            # Set to "true" to restart containerd after patching its config.
            - name: RESTART_CONTAINERD
              value: "true"
            - name: ACCELERATOR_LOG_LEVEL
              value: info
          volumeMounts:
            - name: host-root
              mountPath: /host
            # Expose the host containerd socket so systemctl can be called.
            - name: host-run
              mountPath: /host/run

      # ------------------------------------------------------------------ #
      # Main container: keep-alive so the DaemonSet stays Running.         #
      # Without this Kubernetes would keep restarting the init container.  #
      # ------------------------------------------------------------------ #
      containers:
        - name: accelerator-toolkit-pause
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 10m
              memory: 10Mi

      volumes:
        - name: host-root
          hostPath:
            path: /
        - name: host-run
          hostPath:
            path: /run
