---
# RBAC: ServiceAccount + ClusterRole for the accelerator-toolkit DaemonSet
apiVersion: v1
kind: ServiceAccount
metadata:
  name: accelerator-toolkit
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: accelerator-toolkit
rules:
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: accelerator-toolkit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: accelerator-toolkit
subjects:
  - kind: ServiceAccount
    name: accelerator-toolkit
    namespace: kube-system
