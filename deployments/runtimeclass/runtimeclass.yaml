---
# Legacy reference manifest.
# Current deployment flow should render RuntimeClass from a profile:
#   go run ./cmd/accelerator-profile-render runtimeclass --profile profiles/iluvatar-bi-v150.yaml
# or:
#   make render-runtimeclass PROFILE=profiles/iluvatar-bi-v150.yaml
#
# Keep this file only as a readable Iluvatar example; do not treat it as the
# source of truth for deployment.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: iluvatar-bi-v150
handler: iluvatar-bi-v150
scheduling:
  nodeSelector:
    iluvatar.ai/gpu: "present"
  tolerations:
    - key: iluvatar.ai/gpu
      operator: Exists
      effect: NoSchedule
