apiVersion: batch/v1
kind: Job
metadata:
  name: ascend-910b-portable-train-transformer
  namespace: crater-workspace
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: ascend-910b-portable-train-transformer
    spec:
      restartPolicy: Never
      runtimeClassName: xpu-runtime
      nodeSelector:
        accelerator: huawei-Ascend910
      containers:
        - name: train
          image: crater-harbor.act.buaa.edu.cn/xpu-huangsy/ascend-910b-pytorch-backend:cann851-py311-torch271-npu271post3
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - /opt/portable-training-tests/tiny_transformer_train.py
            - --steps
            - "20"
            - --batch-size
            - "8"
            - --seq-len
            - "64"
          volumeMounts:
            - name: portable-training-tests
              mountPath: /opt/portable-training-tests
              readOnly: true
          resources:
            limits:
              huawei.com/Ascend910: "1"
              cpu: "4"
              memory: 16Gi
            requests:
              huawei.com/Ascend910: "1"
              cpu: "4"
              memory: 16Gi
      volumes:
        - name: portable-training-tests
          configMap:
            name: ascend-910b-portable-training-tests
            defaultMode: 0755
