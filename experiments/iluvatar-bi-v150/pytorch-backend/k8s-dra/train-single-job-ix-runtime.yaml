apiVersion: batch/v1
kind: Job
metadata:
  name: dra-cdi-iluvatar-train-single-ix
  namespace: crater-workspace
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: dra-cdi-iluvatar-train-single-ix
    spec:
      restartPolicy: Never
      runtimeClassName: ix
      nodeSelector:
        kubernetes.io/hostname: inspur-01
      tolerations:
        - operator: Exists
      containers:
        - name: train
          image: crater-harbor.act.buaa.edu.cn/tianshu/corex:4.3.0
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - /opt/portable-training-tests/portable_resnet_train.py
            - --steps
            - "20"
            - --batch-size
            - "32"
          volumeMounts:
            - name: portable-training-tests
              mountPath: /opt/portable-training-tests
              readOnly: true
          resources:
            claims:
              - name: gpu
            limits:
              cpu: "4"
              memory: 16Gi
            requests:
              cpu: "4"
              memory: 16Gi
      resourceClaims:
        - name: gpu
          resourceClaimTemplateName: iluvatar-gpu-claim
      volumes:
        - name: portable-training-tests
          configMap:
            name: iluvatar-bi-v150-portable-training-tests
            defaultMode: 0755
