apiVersion: batch/v1
kind: Job
metadata:
  name: iluvatar-bi-v150-backend-query-python3
  namespace: crater-workspace
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: inspur-01
      containers:
        - name: query
          image: crater-harbor.act.buaa.edu.cn/tianshu/corex:4.3.0
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -lc
            - |
              set -euxo pipefail
              echo "=== env ==="
              env | sort | grep -E 'ILUVATAR|COREX|CUDA|LD_LIBRARY|PYTHONPATH|PATH|NCCL|MPI' || true
              echo "=== devices ==="
              ls -l /dev/iluvatar* || true
              echo "=== corex ==="
              ls -ld /usr/local/corex /usr/local/corex-4.3.0 || true
              ls /usr/local/corex/bin/ixsmi || true
              /usr/local/corex/bin/ixsmi --query-gpu=index,uuid --format=csv || true
              echo "=== python ==="
              which python || true
              which python3 || true
              python3 - <<'PY'
              import os
              import torch

              print("torch_version", torch.__version__)
              print("torch_cuda_version", getattr(torch.version, "cuda", None))
              print("cuda_is_available", torch.cuda.is_available())
              print("cuda_device_count", torch.cuda.device_count())
              print("distributed_is_available", torch.distributed.is_available())
              print("nccl_is_available", torch.distributed.is_nccl_available())
              print("gloo_is_available", torch.distributed.is_gloo_available())

              if torch.cuda.is_available():
                  device = torch.device("cuda:0")
                  print("device_name", torch.cuda.get_device_name(0))
              else:
                  device = torch.device("cpu")
                  print("device_name", "cpu")

              x = torch.randn(64, 64, device=device, requires_grad=True)
              w = torch.randn(64, 64, device=device, requires_grad=True)
              y = (x @ w).relu().mean()
              y.backward()
              print("backward_ok", True)
              print("loss", float(y.detach().cpu()))

              for key in sorted(os.environ):
                  if key.startswith("ILUVATAR") or key.startswith("COREX"):
                      print("env", key, os.environ[key])
              PY
          resources:
            limits:
              cpu: "4"
              memory: 16Gi
              iluvatar.com/gpu: "1"
            requests:
              cpu: "4"
              memory: 16Gi
              iluvatar.com/gpu: "1"
