apiVersion: batch/v1
kind: Job
metadata:
  name: metax-c500-backend-smoke-v2
  namespace: crater-workspace
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: metax-c500-backend-smoke-v2
    spec:
      restartPolicy: Never
      runtimeClassName: metax
      nodeSelector:
        kubernetes.io/hostname: greatwall-02
      containers:
        - name: smoke
          image: cr.metax-tech.com/public-library/maca-pytorch:3.5.3.6-torch2.4-py310-kylinv10-arm64
          imagePullPolicy: IfNotPresent
          command:
            - /opt/conda/bin/python3
            - /opt/metax-c500-backend/smoke_tests/metax_c500_smoke.py
            - --level
            - l3
            - --steps
            - "10"
          volumeMounts:
            - name: metax-c500-smoke-tests
              mountPath: /opt/metax-c500-backend/smoke_tests
              readOnly: true
          resources:
            limits:
              metax-tech.com/gpu: "2"
              cpu: "16"
              memory: 128Gi
            requests:
              metax-tech.com/gpu: "2"
              cpu: "16"
              memory: 128Gi
      volumes:
        - name: metax-c500-smoke-tests
          configMap:
            name: metax-c500-smoke-tests
            defaultMode: 0755
