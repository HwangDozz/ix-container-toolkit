apiVersion: batch/v1
kind: Job
metadata:
  name: metax-c500-portable-train-transformer
  namespace: crater-workspace
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: metax-c500-portable-train-transformer
    spec:
      restartPolicy: Never
      runtimeClassName: metax
      nodeSelector:
        kubernetes.io/hostname: greatwall-02
      containers:
        - name: train
          image: cr.metax-tech.com/public-library/maca-pytorch:3.5.3.6-torch2.4-py310-kylinv10-arm64
          imagePullPolicy: IfNotPresent
          command:
            - /opt/conda/bin/python3
            - /opt/metax-c500-backend/training_tests/tiny_transformer_train.py
            - --steps
            - "20"
            - --batch-size
            - "8"
          volumeMounts:
            - name: metax-c500-portable-training-tests
              mountPath: /opt/metax-c500-backend/training_tests
              readOnly: true
          resources:
            limits:
              metax-tech.com/gpu: "2"
              cpu: "16"
              memory: 128Gi
            requests:
              metax-tech.com/gpu: "2"
              cpu: "16"
              memory: 128Gi
      volumes:
        - name: metax-c500-portable-training-tests
          configMap:
            name: metax-c500-portable-training-tests
            defaultMode: 0755
